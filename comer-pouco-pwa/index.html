<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<title>eat</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="eat">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
  <header>
    <h1>eat</h1>
    <p class="sub">Comer pouco, um dia de cada vez.</p>
  </header>

  <section class="counter card">
    <div class="day-label">Dia</div>
    <div class="day-number" id="dayNumber">—</div>
    <div class="day-total">de 90</div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-meta" id="progressMeta">—</div>
  </section>

  <section class="card today">
    <h2 id="todayTitle">Hoje</h2>
    <label class="check">
      <input type="checkbox" id="chkAlmoco">
      <span class="box"></span>
      <span class="label-text">
        <strong>Pós-almoço</strong>
        <em>lembrete 13:00</em>
      </span>
    </label>
    <label class="check">
      <input type="checkbox" id="chkJantar">
      <span class="box"></span>
      <span class="label-text">
        <strong>Pós-jantar</strong>
        <em>lembrete 19:00</em>
      </span>
    </label>
  </section>

  <section class="card stats">
    <div class="stat"><span id="statStreak">0</span><em>streak</em></div>
    <div class="stat"><span id="statDone">0</span><em>check-ins</em></div>
    <div class="stat"><span id="statPct">0%</span><em>aderência</em></div>
  </section>

  <section class="card history">
    <h2>Histórico</h2>
    <div class="grid" id="historyGrid"></div>
    <div class="legend">
      <span><i class="dot done"></i> dia cheio</span>
      <span><i class="dot half"></i> parcial</span>
      <span><i class="dot miss"></i> faltou</span>
      <span><i class="dot future"></i> futuro</span>
    </div>
  </section>

  <section class="card actions">
    <button id="btnNotif">Ativar lembretes</button>
    <button id="btnReset" class="ghost">Reiniciar contador</button>
    <p class="tip" id="notifTip"></p>
  </section>

  <footer>
    <small>PWA offline · instale na tela inicial</small>
  </footer>
</main>
<script src="app.js"></script>
</body>
</html>
